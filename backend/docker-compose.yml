services:
  postgres:
    image: postgres:16
    container_name: orquidario_yojo_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: orquidario_yojo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orquidario_yojo"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: orquidario_yojo_backend
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - ../frontend:/home/node/app/frontend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/orquidario_yojo
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: