services:
  postgres:
    image: postgres:16
    container_name: orquidario_yojo_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: orquidario_yojo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orquidario_yojo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
